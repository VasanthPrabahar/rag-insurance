name: eval

on:
  push:
    branches: [main]
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: rag_insurance
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/rag_insurance

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2

      - name: Cache corpus
        uses: actions/cache@v4
        with:
          path: data/raw
          key: corpus-${{ hashFiles('src/rag_insurance/manifest.py') }}

      - name: Install dependencies
        run: uv sync

      - name: Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Pytest
        run: uv run pytest tests/ -q

      - name: Download corpus
        # State DOI sites / Wayback sometimes block datacenter IPs; the
        # cache above usually makes this a no-op. 10 of 15 docs is enough
        # for a meaningful retrieval eval signal in CI.
        run: uv run python scripts/download_data.py --min-success 10

      - name: Ingest
        run: uv run rag ingest

      - name: Retrieval eval (no LLM in CI)
        run: uv run rag eval --skip-llm --tag ci
